name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64, armv7, mipsel]
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenWrt SDK build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3 python3-setuptools \
            rsync swig unzip zlib1g-dev file wget zstd

      - name: Build packages
        run: make ipk-${{ matrix.arch }}

      - name: Collect artifacts
        run: |
          mkdir -p out
          find "dist/${{ matrix.arch }}" -type f \( -name '*.ipk' -o -name '*.apk' \) \
            -exec cp -v {} out/ \;
          ls -l out

      - uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.arch }}
          path: out/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    # Only publish on a real tag push; workflow_dispatch runs are build-only checks.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          mkdir -p assets
          find artifacts -type f \( -name '*.ipk' -o -name '*.apk' \) \
            -exec cp -v {} assets/ \;
          ls -l assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag \
            assets/*
